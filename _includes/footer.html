<footer class="site-footer h-card">
  <link rel="stylesheet" href="/assets/css/footer.css">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper footer-inner">
    <div class="footer-identity">
      <span class="p-name">
        {%- if site.author -%}{{ site.author | escape }}{%- else -%}{{ site.title | escape }}{%- endif -%}
      </span>
      {%- if site.email -%}
      <a class="u-email" href="mailto:{{ site.email }}">{{ site.email }}</a>
      {%- endif -%}
    </div>

    <ul class="footer-social">
      {%- for entry in site.social_links -%}
      <li>
        <a rel="me" href="{{ entry.user_url }}" title="{{ entry.platform | capitalize }}">
          <svg class="svg-icon"><use xlink:href="{{ '/assets/minima-social-icons.svg#' | append: entry.platform | relative_url }}"></use></svg>
          <span class="username">{{ entry.platform | capitalize }}</span>
        </a>
      </li>
      {%- endfor -%}
    </ul>
  </div>
</footer>
