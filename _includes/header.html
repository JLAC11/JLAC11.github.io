<header class="site-header">
  <div class="wrapper">
    <a class="site-title" rel="author" href="{{ '/' | relative_url }}"
      >{{ site.title | escape }}</a
    >

    {% if site.header_pages %}
    <nav class="site-nav">
      <div class="trigger">
        {% for path in site.header_pages %} {% assign my_page = site.pages |
        where: "path", path | first %} {% if my_page %}
        <a class="page-link" href="{{ my_page.url | relative_url }}"
          >{{ my_page.title | default: my_page.name | escape }}</a
        >
        {% endif %} {% endfor %}
      </div>
    </nav>
    {% endif %}
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0e14;
        --bg2: #0f1520;
        --bg3: #151d2e;
        --bg4: #1c2638;
        --border: rgba(100, 160, 255, 0.12);
        --border2: rgba(100, 160, 255, 0.22);
        --accent: #4a9eff;
        --accent2: #00d4aa;
        --accent3: #ff6b6b;
        --amber: #f0a500;
        --purple: #9b7fe8;
        --text: #c8d8f0;
        --text2: #7a96b8;
        --text3: #94a3b9;
        --mono: "IBM Plex Mono", monospace;
        --sans: "IBM Plex Sans", sans-serif;
        --green: #00d4aa;
      }

      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100vh;
        font-size: 14px;
        line-height: 1.5;
      }

      /* ── Layout ── */
      .shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 24px 60px;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 32px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
      }
      .site-title {
        font-family: var(--mono);
        font-size: 24px;
        color: var(--text3);
        letter-spacing: 0.04em;
      }
      .header-left h1 {
        font-family: var(--mono);
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .header-left p {
        font-size: 12px;
        color: var(--text3);
        font-family: var(--mono);
        letter-spacing: 0.04em;
      }
      .header-badge {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--accent2);
        border: 1px solid rgba(0, 212, 170, 0.3);
        padding: 4px 10px;
        border-radius: 3px;
        letter-spacing: 0.06em;
      }

      /* ── Controls ── */
      .controls-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 20px;
      }
      .control-block {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 14px 16px;
      }
      .control-block label {
        display: block;
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 10px;
      }
      .control-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .control-val {
        font-family: var(--mono);
        font-size: 16px;
        font-weight: 500;
        color: var(--accent);
        min-width: 56px;
        text-align: right;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        flex: 1;
        height: 3px;
        background: var(--bg4);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid var(--bg);
        box-shadow: 0 0 0 1px var(--accent);
        cursor: pointer;
        transition: transform 0.15s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid var(--bg);
        cursor: pointer;
      }

      /* Friction block spans full width */
      .friction-block {
        grid-column: 1 / -1;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .friction-block label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text3);
        white-space: nowrap;
      }
      .friction-desc {
        font-size: 12px;
        color: var(--text2);
        flex: 1;
        font-family: var(--mono);
      }
      .friction-val {
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 500;
        color: var(--amber);
        min-width: 180px;
        text-align: right;
      }

      /* ── Implied PSA pill ── */
      .psa-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text2);
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 6px 14px;
        margin-bottom: 20px;
      }
      .psa-pill b {
        color: var(--accent2);
        font-weight: 600;
      }
      .psa-tag {
        font-size: 10px;
        color: var(--accent);
        border: 1px solid rgba(74, 158, 255, 0.3);
        padding: 2px 6px;
        border-radius: 2px;
        letter-spacing: 0.05em;
      }

      /* ── Metrics ── */
      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
        margin-bottom: 28px;
      }
      .metric-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 14px 16px;
        position: relative;
        overflow: hidden;
      }
      .metric-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
        opacity: 0.4;
      }
      .metric-card:nth-child(2)::before {
        background: var(--accent2);
      }
      .metric-card:nth-child(3)::before {
        background: var(--amber);
      }
      .metric-card:nth-child(4)::before {
        background: var(--coral, #ff6b6b);
      }
      .metric-card:nth-child(5)::before {
        background: var(--purple);
      }
      .metric-lbl {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 8px;
      }
      .metric-val {
        font-family: var(--mono);
        font-size: 22px;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 4px;
      }
      .metric-sub {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
      }

      /* ── Tabs ── */
      .tab-bar {
        display: flex;
        gap: 2px;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--border);
      }
      .tab-btn {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        padding: 8px 16px;
        background: none;
        border: none;
        color: var(--text3);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        transition:
          color 0.15s,
          border-color 0.15s;
      }
      .tab-btn:hover {
        color: var(--text2);
      }
      .tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      /* ── Chart area ── */
      .chart-panel {
        display: none;
      }
      .chart-panel.active {
        display: block;
      }
      .legend-row {
        display: flex;
        gap: 20px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text2);
      }
      .l-line {
        width: 22px;
        height: 2px;
        border-radius: 1px;
        display: inline-block;
      }
      .l-dash {
        width: 22px;
        height: 0;
        border-top: 2px dashed;
        display: inline-block;
      }
      .l-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }
      .chart-wrap {
        position: relative;
        width: 100%;
        height: 280px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 16px;
      }

      /* ── Footer ── */
      footer {
        margin-top: 40px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        letter-spacing: 0.04em;
      }

      @media (max-width: 760px) {
        .controls-grid {
          grid-template-columns: 1fr 1fr;
        }
        .metrics-grid {
          grid-template-columns: 1fr 1fr;
        }
        .friction-block {
          flex-wrap: wrap;
        }
      }
      @media (max-width: 480px) {
        .controls-grid {
          grid-template-columns: 1fr;
        }
        .metrics-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </div>
</header>
